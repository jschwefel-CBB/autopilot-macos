name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build

      - name: Build TestHostApp fixture
        run: Fixtures/TestHostApp/make-app.sh

      - name: Test
        run: swift test

  lint-plans:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      # Lint the committed unified plan (and any others under uitests/).
      - name: Lint unified plan
        run: .build/debug/autopilot lint Fixtures/TestHostApp/test-all-capabilities.json
      - name: Lint plans (if any)
        run: |
          if [ -d uitests ]; then
            .build/debug/autopilot lint uitests || true
          fi

  # End-to-end: run the FULL unified 78-step plan via the CLI against the
  # TestHostApp fixture — the macOS analogue of the iOS XCUITest / Android
  # instrumented run. This is a hard gate: any failing step fails the job.
  #
  # GUI automation needs Accessibility (all interaction) and Screen Recording
  # (the 3 visual steps). We grant both to the test process up front. If the
  # runner image refuses the grant, `autopilot doctor` makes that explicit in
  # the log rather than failing with an opaque error.
  unified-plan:
    # Runs on a SELF-HOSTED macOS runner with a real, logged-in GUI session.
    # Native-macOS GUI automation (synthesized clicks, menu tracking, live AX
    # reads) needs a real WindowServer; GitHub's hosted runner is headless
    # ("no SPDisplays") and drops ~2-5% of interactions at random, making the
    # gate flaky. On a real display the plan passes reliably (verified 10/10).
    #
    # SECURITY: only run on pushes to this repo and on PRs from SAME-REPO
    # branches — NEVER on fork PRs (head.repo.fork), so an untrusted fork
    # cannot execute code on the self-hosted machine. Outside-collaborator
    # workflow approval is also required at the repo level (defense in depth).
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false)
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4

      - name: Build CLI + fixture
        run: |
          swift build
          Fixtures/TestHostApp/make-app.sh

      - name: Permission status (doctor)
        # The self-hosted runner's session must have Accessibility + Screen
        # Recording granted (System Settings > Privacy & Security) for the
        # process tree running the runner. doctor reports the status; the plan
        # run below fails clearly if either is missing.
        run: .build/debug/autopilot doctor

      - name: Run unified plan (hard gate)
        run: bash scripts/run-unified-plan.sh

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unified-plan-artifacts
          path: /tmp/*/artifacts/**
